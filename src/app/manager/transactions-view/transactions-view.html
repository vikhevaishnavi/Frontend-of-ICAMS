<div class="transaction-management-container">
 
  <div class="header-section">
    <div>
      <h1 class="page-title">Transaction History</h1>
      <p class="subtitle">
        Read-only comprehensive log of all branch transactions.
      </p>
    </div>
  </div>
 
  <!-- Loading -->
  <div *ngIf="isLoading" class="empty-state">
    Loading transactions...
  </div>
 
  <!-- Table -->
  <div class="table-container" *ngIf="!isLoading">
    <table class="transaction-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Account</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
 
      <tbody>
 
        <tr *ngFor="let txn of transactions">
 
          <td>
            {{ txn.timestamp | date:'short' }}
          </td>
 
          <td>
            <span class="type-badge">
              {{ txn.type }}
            </span>
          </td>
 
          <td class="fw-600">
            {{ txn.accountId }}
          </td>
 
          <td>
            {{ txn.amount | currency:'INR':'symbol':'1.0-0' }}
          </td>
 
          <td>
            {{ txn.status }}
          </td>
 
        </tr>
 
        <tr *ngIf="transactions.length === 0">
          <td colspan="5" class="empty-state">
            No transactions found.
          </td>
        </tr>
 
      </tbody>
    </table>
  </div>
 
</div>
